; PlatformIO Project Configuration — Omniphone
; https://docs.platformio.org/page/projectconf.html
;
; ── Monorepo layout ──────────────────────────────────────────────────────────
; Each instrument is a folder under variants/, selected by its [env:...] via
; build_src_filter. Shared libraries live in lib/ (MPR121, LCD driver) and are
; compiled into every env automatically. Diagnostic sketches live in test/.
;
; Build/upload a variant:   pio run -e <env>            (add -t upload to flash)
;
;   env                     board       pads  sensor   audio            notes
;   ─────────────────────   ─────────   ────  ───────  ───────────────  ──────────────
;   pico-13pad   (default)  RP2040       13   MPR121   Mozzi / I2S      earlephilhower core
;   esp32s3-19pad           ESP32-S3     19   4×MPR121 I2S sine        T-Display-S3 instrument (+ -ota); esp32s3-test = bench
;   teensy40-11pad          Teensy 4.0   11   MPR121   Teensy Audio     original firmware
;   teensy40-12pad-screen   Teensy 4.0   12   MPR121   Teensy Audio     + 1.28" round LCD
;   teensy32-13pad          Teensy 3.2   13   MPR121   Teensy Audio
;   teensy-lc-7voice        Teensy LC     7   TSI      internal DAC     standalone, WS2812 + PWM LEDs
;   esp32audiokit-sampling  ESP32-WROVER  4*  buttons  ES8388 I2S       live sampler (mic record + granular); *Phase-1 onboard keys

[platformio]
default_envs = pico-13pad

; ═══════════════════════ VARIANTS ═══════════════════════════════════════════

; ── Raspberry Pi Pico (RP2040) — 13-pad, Mozzi ───────────────────────────────
; earlephilhower core (NOT mbed): Mozzi's RP2040 I2S + analogWrite LED PWM need it.
[env:pico-13pad]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
lib_ldf_mode = chain+
lib_deps = https://github.com/sensorium/Mozzi.git
build_flags = -D OMNIPHONE_PICO
build_src_filter = -<*> +<../variants/pico-13pad/>

; ── Pico audio-path isolation test — sine Cmaj7, no sensors ──────────────────
[env:pico-chord-test]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
lib_ldf_mode = chain+
lib_deps = https://github.com/sensorium/Mozzi.git
build_flags = -D OMNIPHONE_PICO
build_src_filter = -<*> +<../test/pico_mozzi_chord.cpp>

; ── Pico bare-pin capacitive-sensing comparison test — no MPR121, no extras ──
; Two pin-only capsense methods on GP10/11/12 (internal pull-up, no resistor):
;   1) jtouch — internal pull-up charge-time, self-timed CPU cycle counter
;   2) relaxation oscillator + PIO frequency counter (RP2040 PIO state machine)
; Switch live over serial (1 / 2 / r) and plot to Teleplot @115200.
;   pio run -e pico-capsense-test -t upload
[env:pico-capsense-test]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
lib_ldf_mode = chain+
monitor_speed = 115200
build_flags = -D OMNIPHONE_PICO
build_src_filter = -<*> +<../test/pico_capsense_test.cpp>

; Shared ESP32-S3 build flags (no env: prefix → not a build target, just reused
; via ${esp32s3_common.build_flags}). Each concrete env adds its own OTA_HOSTNAME
; so the instruments are distinguishable on the network for OTA.
[esp32s3_common]
build_flags =
    -D OMNIPHONE_ESP32S3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ── ESP32-S3 (T-Display-S3) — 19-pad INSTRUMENT ──────────────────────────────
; The real firmware (variants/esp32s3-19pad/instrument.cpp): 19 sine voices over
; I²S, accordion note layout, MPR121 sensing (no LEDs), screen CPU/MEM/BAT.
; First flash over USB; afterwards over WiFi (env esp32s3-19pad-ota).
[env:esp32s3-19pad]
platform = espressif32
board = esp32-s3-devkitc-1     ; generic S3 DevKit — fits the T8-S3 / T-Display-S3
framework = arduino
lib_ldf_mode = chain+
monitor_speed = 115200
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv   ; dual app slots → OTA-capable
lib_deps = ${tdisplay.lib_deps}
; Route Arduino Serial to the S3's USB-Serial-JTAG (the USB-C port) instead of
; UART0 — otherwise Serial.print() goes to GPIO43/44 and nothing reaches USB.
; (If your board's USB-C is the native USB-OTG port instead, use ARDUINO_USB_MODE=0.)
; OTA_HOSTNAME makes this instrument show up as omniphone-19pad.local — distinct
; from other ESP32 instruments (see esp32s3_common + each board's own name).
build_flags =
    ${esp32s3_common.build_flags}
    -D OTA_HOSTNAME=\"omniphone-19pad\"
    ${tdisplay.build_flags}
build_src_filter = -<*> +<../variants/esp32s3-19pad/instrument.cpp>

; ── ESP32-S3 — capsense + live web/JSON view (the earlier bring-up test) ─────
; Wireless flash + monitor for the instrument (Board A, omniphone-19pad.local).
[env:esp32s3-19pad-ota]
extends = env:esp32s3-19pad
upload_protocol = espota
upload_port = omniphone-19pad.local
monitor_port = socket://omniphone-19pad.local:23
upload_flags = --auth=${sysenv.OMNIPHONE_OTA_PASSWORD}

; ── Shared TFT_eSPI config for LilyGO T-Display-S3 (8-bit parallel ST7789) ────
; (No env: prefix → reused via ${tdisplay.*} by the envs that drive the screen.)
[tdisplay]
lib_deps = bodmer/TFT_eSPI@^2.5.43
build_flags =
    -D DISABLE_ALL_LIBRARY_WARNINGS
    -D USER_SETUP_LOADED
    -D ST7789_DRIVER
    -D INIT_SEQUENCE_3
    -D CGRAM_OFFSET
    -D TFT_RGB_ORDER=TFT_RGB
    -D TFT_INVERSION_ON
    -D TFT_PARALLEL_8_BIT
    -D TFT_WIDTH=170
    -D TFT_HEIGHT=320
    -D TFT_CS=6
    -D TFT_DC=7
    -D TFT_RST=5
    -D TFT_WR=8
    -D TFT_RD=9
    -D TFT_D0=39
    -D TFT_D1=40
    -D TFT_D2=41
    -D TFT_D3=42
    -D TFT_D4=45
    -D TFT_D5=46
    -D TFT_D6=47
    -D TFT_D7=48
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4

; ── ESP32-S3 Board A — ONE diagnostic env (currently the AUDIO test) ─────────
; Inherits the instrument's board/flags/TFT; only the source file differs. To run
; a different bench sketch, point build_src_filter at its file — the other test
; sources still live in variants/esp32s3-19pad/:
;   audio_test · led_pin_test · mpr_sense_led_test · mpr_senseonly_test ·
;   screen_white_test
[env:esp32s3-test]
extends = env:esp32s3-19pad
build_src_filter = -<*> +<../variants/esp32s3-19pad/audio_test.cpp>

[env:esp32s3-test-ota]
extends = env:esp32s3-test
upload_protocol = espota
upload_port = omniphone-19pad.local
monitor_port = socket://omniphone-19pad.local:23
upload_flags = --auth=${sysenv.OMNIPHONE_OTA_PASSWORD}

; ── ESP32-S3 Board B — native-touch experiment (own board / OTA name) ────────
; The S3's built-in touch channels (GPIO1–14), no MPR121. Streams to Teleplot.
[env:esp32s3-native-touch]
extends = env:esp32s3-19pad
build_src_filter = -<*> +<../variants/esp32s3-19pad/native_touch_test.cpp>
build_flags =
    ${esp32s3_common.build_flags}
    -D OTA_HOSTNAME=\"omniphone-native\"

[env:esp32s3-native-touch-ota]
extends = env:esp32s3-native-touch
upload_protocol = espota
upload_port = omniphone-native.local
monitor_port = socket://omniphone-native.local:23
upload_flags = --auth=${sysenv.OMNIPHONE_OTA_PASSWORD}

; ── ESP32 Audio Kit (AI-Thinker v2.2 / A247) — live SAMPLER ──────────────────
; ESP32-WROVER (8 MB PSRAM) + ES8388 codec, onboard mic + speaker. Phase 1 uses
; the six onboard buttons (no MPR121 yet): KEY1/KEY2 = mode modifiers, KEY3–6 =
; four sample slots. Records off MIC1, trims leading silence, plays one-shot
; (Mode A) or endless granular drone (Mode B).
;   pio run -e esp32audiokit-sampling -t upload
[env:esp32audiokit-sampling]
platform = espressif32
board = esp-wrover-kit          ; ESP32-WROVER module with PSRAM (matches A1S)
framework = arduino
lib_ldf_mode = chain+
monitor_speed = 115200
board_build.flash_size = 4MB
board_build.partitions = huge_app.csv      ; one big app slot (no OTA here)
build_flags =
    -D OMNIPHONE_AUDIOKIT
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
build_src_filter = -<*> +<../variants/esp32audiokit-sampling/sampler.cpp>

; ── Teensy 4.0 — 11-pad, Teensy Audio Library (original) ─────────────────────
; USB type Serial+MIDI: serial console works AND it enumerates as USB-MIDI (MPE).
[env:teensy40-11pad]
platform = teensy
board = teensy40
framework = arduino
lib_ldf_mode = chain+
build_flags = -D USB_MIDI_SERIAL
build_src_filter = -<*> +<../variants/teensy40-11pad/>

; ── Teensy 4.0 — 12-pad + 1.28" round LCD ────────────────────────────────────
[env:teensy40-12pad-screen]
platform = teensy
board = teensy40
framework = arduino
lib_ldf_mode = chain+
build_flags = -D USB_MIDI_SERIAL
build_src_filter = -<*> +<../variants/teensy40-12pad-screen/>

; ── Teensy 3.2 — 13-pad ──────────────────────────────────────────────────────
[env:teensy32-13pad]
platform = teensy
board = teensy31          ; PlatformIO uses teensy31 for both 3.1 and 3.2
framework = arduino
lib_ldf_mode = chain+
build_flags = -D USB_MIDI_SERIAL
build_src_filter = -<*> +<../variants/teensy32-13pad/>

; ── Teensy LC — 7-pad TSI, internal DAC (standalone) ─────────────────────────
[env:teensy-lc-7voice]
platform = teensy
board = teensylc
framework = arduino
lib_ldf_mode = chain+
build_flags = -D USB_SERIAL
lib_deps = https://github.com/PaulStoffregen/WS2812Serial
build_src_filter = -<*> +<../variants/teensy-lc-7voice/>

; ═══════════════════════ DIAGNOSTIC / BRING-UP SKETCHES ═════════════════════
; Standalone test firmwares (Teensy 4.0 unless noted), one source each in test/.
[env:raw_sensor_readout]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/raw_sensor_readout.cpp>

[env:sensor_comparison]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/sensor_comparison.cpp>

[env:led_test]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/led_test.cpp>

[env:electrode_relocation]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/electrode_relocation.cpp>

[env:strike_tuning]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/strike_tuning.cpp>

[env:proximity_tuning]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/proximity_tuning.cpp>
