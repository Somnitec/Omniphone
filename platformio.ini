; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; This branch (13-pad-raspi-pico) targets the Raspberry Pi Pico (RP2040) with a
; Mozzi audio backend, no screen. The original Teensy 4.0 firmware is kept and
; still builds. A future ESP32-S3 (LilyGO T-FPGA) env is scaffolded below.
;
; Board ↔ source ↔ engine:
;   env:omniphone-pico       RP2040   main_pico.cpp  Mozzi  (default — this branch)
;   env:omniphone-esp32-s3   ESP32-S3 main_pico.cpp  Mozzi  (scaffold — finish I2S pins)
;   env:omniphone-teensy40   Teensy40 main.cpp       Teensy Audio Library (legacy 11-pad)
;   env:omniphone-teensy32   Teensy32 test sketch    (standalone 13-pad experiment)
;
; Each Teensy board is its own env (different `board =`, and the LC/3.2 lack the
; 4.0's RAM/FPU). Add an omniphone-teensy-lc env the same way if you revive the LC.
[platformio]
default_envs = omniphone-pico

; ── Raspberry Pi Pico (RP2040) — 13-pad, Mozzi ───────────────────────────────
; Uses the earlephilhower arduino-pico core (NOT the default mbed core) because
; Mozzi's RP2040 I2S output and analogWrite() LED PWM rely on it. The community
; platform fork below is what selects that core in PlatformIO.
[env:omniphone-pico]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
lib_ldf_mode = chain+
lib_deps =
    https://github.com/sensorium/Mozzi.git
build_flags = -D OMNIPHONE_PICO
build_src_filter = -<*> +<main_pico.cpp>

; ── ESP32-S3 (LilyGO T-FPGA) — 13-pad, Mozzi — SCAFFOLD ──────────────────────
; Same firmware/engine as the Pico; finish the I2S DAC pins in main_pico.cpp
; (the OMNIPHONE_ESP32S3 branch) and confirm the board variant below.
[env:omniphone-esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1   ; TODO: swap for the LilyGO T-FPGA variant if/when packaged
framework = arduino
lib_ldf_mode = chain+
lib_deps =
    https://github.com/sensorium/Mozzi.git
build_flags = -D OMNIPHONE_ESP32S3
build_src_filter = -<*> +<main_pico.cpp>

; ── Legacy Teensy 4.0 firmware (11-pad, Teensy Audio Library) ────────────────
; Kept working. Excludes main_pico.cpp so the two main()s don't collide.
[env:omniphone-teensy40]
platform = teensy
board = teensy40
framework = arduino
lib_ldf_mode = chain+
; Teensy USB type: Serial + MIDI — serial console keeps working AND the
; board enumerates as a USB-MIDI device for the MPE output.
build_flags = -D USB_MIDI_SERIAL
build_src_filter = +<*> -<main_pico.cpp>

; ── Testing firmwares (Teensy) ───────────────────────────────────────────────
[env:raw_sensor_readout]
extends = env:omniphone-teensy40
build_src_filter = -<*> +<../test/raw_sensor_readout.cpp>

[env:sensor_comparison]
extends = env:omniphone-teensy40
build_src_filter = -<*> +<../test/sensor_comparison.cpp>

[env:led_test]
extends = env:omniphone-teensy40
build_src_filter = -<*> +<../test/led_test.cpp>

[env:electrode_relocation]
extends = env:omniphone-teensy40
build_src_filter = -<*> +<../test/electrode_relocation.cpp>

[env:strike_tuning]
extends = env:omniphone-teensy40
build_src_filter = -<*> +<../test/strike_tuning.cpp>

[env:proximity_tuning]
extends = env:omniphone-teensy40
build_src_filter = -<*> +<../test/proximity_tuning.cpp>

; ── Teensy 3.2 13-pad firmware (own board, standalone test sketch) ───────────
[env:omniphone-teensy32]
platform = teensy
board = teensy31       ; PlatformIO uses teensy31 for both Teensy 3.1 and 3.2
framework = arduino
lib_ldf_mode = chain+
build_flags = -D USB_MIDI_SERIAL
build_src_filter = -<*> +<../test/teensy32_thirteen.cpp>
