; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = teensy40

; ── Main firmware (upload to Teensy 4.0) ─────────────────────────────────────
[env:teensy40]
platform = teensy
board = teensy40
framework = arduino
lib_ldf_mode = chain+

; ── Testing firmwares
[env:raw_sensor_readout] ; hardware troubleshooter
extends = env:teensy40
build_src_filter = +<../test/raw_sensor_readout.cpp> -<main.cpp>
upload_command = echo "Upload disabled for hardware test environment"