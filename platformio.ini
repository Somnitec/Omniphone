; PlatformIO Project Configuration — Omniphone
; https://docs.platformio.org/page/projectconf.html
;
; ── Monorepo layout ──────────────────────────────────────────────────────────
; Each instrument is a folder under variants/, selected by its [env:...] via
; build_src_filter. Shared libraries live in lib/ (MPR121, LCD driver) and are
; compiled into every env automatically. Diagnostic sketches live in test/.
;
; Build/upload a variant:   pio run -e <env>            (add -t upload to flash)
;
;   env                     board       pads  sensor   audio            notes
;   ─────────────────────   ─────────   ────  ───────  ───────────────  ──────────────
;   pico-13pad   (default)  RP2040       13   MPR121   Mozzi / I2S      earlephilhower core
;   esp32s3-19pad           ESP32-S3     19   4×MPR121 (TBD)           LilyGO T8-S3, WiFi/OTA — capsense bring-up
;   teensy40-11pad          Teensy 4.0   11   MPR121   Teensy Audio     original firmware
;   teensy40-12pad-screen   Teensy 4.0   12   MPR121   Teensy Audio     + 1.28" round LCD
;   teensy32-13pad          Teensy 3.2   13   MPR121   Teensy Audio
;   teensy-lc-7voice        Teensy LC     7   TSI      internal DAC     standalone, WS2812 + PWM LEDs

[platformio]
default_envs = pico-13pad

; ═══════════════════════ VARIANTS ═══════════════════════════════════════════

; ── Raspberry Pi Pico (RP2040) — 13-pad, Mozzi ───────────────────────────────
; earlephilhower core (NOT mbed): Mozzi's RP2040 I2S + analogWrite LED PWM need it.
[env:pico-13pad]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
lib_ldf_mode = chain+
lib_deps = https://github.com/sensorium/Mozzi.git
build_flags = -D OMNIPHONE_PICO
build_src_filter = -<*> +<../variants/pico-13pad/>

; ── Pico audio-path isolation test — sine Cmaj7, no sensors ──────────────────
[env:pico-chord-test]
platform = raspberrypi
board = pico
framework = arduino
board_build.core = earlephilhower
lib_ldf_mode = chain+
lib_deps = https://github.com/sensorium/Mozzi.git
build_flags = -D OMNIPHONE_PICO
build_src_filter = -<*> +<../test/pico_mozzi_chord.cpp>

; ── ESP32-S3 (LilyGO T8-S3) — 19-pad, 4× MPR121, WiFi/OTA ────────────────────
; Currently a CAPACITIVE-SENSE BRING-UP TEST (variants/esp32s3-19pad/main.cpp):
; reads the 2 sense MPR121s, streams raw+filtered to Teleplot, runs WiFi + OTA,
; and serves a live HTTP/JSON view. Sound engine / LED boards land later.
;   First flash over USB; afterwards flash over WiFi:
;     pio run -e esp32s3-19pad -t upload --upload-port omniphone-esp32.local
[env:esp32s3-19pad]
platform = espressif32
board = esp32-s3-devkitc-1     ; generic S3 DevKit — close enough for the T8-S3
framework = arduino
lib_ldf_mode = chain+
monitor_speed = 115200
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv   ; dual app slots → OTA-capable
; Route Arduino Serial to the S3's USB-Serial-JTAG (the USB-C port) instead of
; UART0 — otherwise Serial.print() goes to GPIO43/44 and nothing reaches USB.
; (If your board's USB-C is the native USB-OTG port instead, use ARDUINO_USB_MODE=0.)
build_flags =
    -D OMNIPHONE_ESP32S3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
; The variant folder holds several bring-up sketches (one main() each), so select
; the capsense test explicitly rather than compiling the whole folder.
build_src_filter = -<*> +<../variants/esp32s3-19pad/main.cpp>
; 8 MB octal PSRAM (T8-S3): the capsense test doesn't need it, so it's left off
; for a clean boot. Enable for the synth port — if the board won't boot, the
; module is quad PSRAM; drop memory_type back to the default.
; board_build.arduino.memory_type = qio_opi
; build_flags = -D OMNIPHONE_ESP32S3 -D BOARD_HAS_PSRAM

; ── ESP32-S3 diagnostic — ELE9/ELE10 LED pin-link test (all 4 MPR121s) ───────
; Fades ELE9, then ELE10, then both, on every board to check the pins aren't
; linked / the open-drain driver isn't faulty (see project notes). Same WiFi/OTA
; + remote serial as the capsense test.
[env:esp32s3-led-test]
extends = env:esp32s3-19pad
build_src_filter = -<*> +<../variants/esp32s3-19pad/led_pin_test.cpp>

; ── ESP32-S3 experiment — NATIVE touch (built-in peripheral, no MPR121) ──────
; Reads the S3's own touch channels (GPIO1–14, max 14 pads) straight off pads
; wired to those GPIOs, streaming raw + delta to Teleplot. Same WiFi/OTA console.
[env:esp32s3-native-touch]
extends = env:esp32s3-19pad
build_src_filter = -<*> +<../variants/esp32s3-19pad/native_touch_test.cpp>

; Wireless variant of the above: uploads over WiFi (espota) and monitors over the
; telnet socket — works with USB still plugged in. Flash once over USB with
; `esp32s3-native-touch`, then use this env for `Upload and Monitor`.
;   (mDNS name from OTA_HOSTNAME in config.h; swap for the IP if .local won't
;    resolve on your network.)
[env:esp32s3-native-touch-ota]
extends = env:esp32s3-native-touch
upload_protocol = espota
upload_port = omniphone-esp32.local
monitor_port = socket://omniphone-esp32.local:23

; ── Teensy 4.0 — 11-pad, Teensy Audio Library (original) ─────────────────────
; USB type Serial+MIDI: serial console works AND it enumerates as USB-MIDI (MPE).
[env:teensy40-11pad]
platform = teensy
board = teensy40
framework = arduino
lib_ldf_mode = chain+
build_flags = -D USB_MIDI_SERIAL
build_src_filter = -<*> +<../variants/teensy40-11pad/>

; ── Teensy 4.0 — 12-pad + 1.28" round LCD ────────────────────────────────────
[env:teensy40-12pad-screen]
platform = teensy
board = teensy40
framework = arduino
lib_ldf_mode = chain+
build_flags = -D USB_MIDI_SERIAL
build_src_filter = -<*> +<../variants/teensy40-12pad-screen/>

; ── Teensy 3.2 — 13-pad ──────────────────────────────────────────────────────
[env:teensy32-13pad]
platform = teensy
board = teensy31          ; PlatformIO uses teensy31 for both 3.1 and 3.2
framework = arduino
lib_ldf_mode = chain+
build_flags = -D USB_MIDI_SERIAL
build_src_filter = -<*> +<../variants/teensy32-13pad/>

; ── Teensy LC — 7-pad TSI, internal DAC (standalone) ─────────────────────────
[env:teensy-lc-7voice]
platform = teensy
board = teensylc
framework = arduino
lib_ldf_mode = chain+
build_flags = -D USB_SERIAL
lib_deps = https://github.com/PaulStoffregen/WS2812Serial
build_src_filter = -<*> +<../variants/teensy-lc-7voice/>

; ═══════════════════════ DIAGNOSTIC / BRING-UP SKETCHES ═════════════════════
; Standalone test firmwares (Teensy 4.0 unless noted), one source each in test/.
[env:raw_sensor_readout]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/raw_sensor_readout.cpp>

[env:sensor_comparison]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/sensor_comparison.cpp>

[env:led_test]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/led_test.cpp>

[env:electrode_relocation]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/electrode_relocation.cpp>

[env:strike_tuning]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/strike_tuning.cpp>

[env:proximity_tuning]
extends = env:teensy40-11pad
build_src_filter = -<*> +<../test/proximity_tuning.cpp>
