; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; ── Main firmware (upload to Teensy 4.0) ─────────────────────────────────────
[env:teensy40]
platform = teensy
board = teensy40
framework = arduino
lib_ldf_mode = chain+
; MPR121 communication is handled by lib/MPR121 — no external dependency needed.

; ── Native unit tests (run on host machine, no hardware required) ─────────────
; Usage:  pio test -e native
;
; Only test suites whose directory names start with "unit_" are included.
; The legacy test/ sketches (basic_single_mpr121_test_code, mpr121_sensor_pwm)
; are not part of this automated suite — they require hardware to be useful.
[env:native]
platform = native
test_framework = unity
test_filter = unit_*
build_flags = -std=gnu++17 -Wall -Wextra
